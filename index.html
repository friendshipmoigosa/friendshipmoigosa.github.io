<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>2027학년도 우정모의고사 · 수학 영역 다운로드</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Spline+Sans+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#17171A; --paper:#F4F2EC; --card:#FBFAF6; --sheet:#F9E6E1;
    --maroon:#A11B2E; --maroon-d:#7C1322; --graphite:#6B6862;
    --line:#DAD5C9; --line-strong:#22201C;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{font-family:"Noto Sans KR",system-ui,sans-serif;color:var(--ink);
    background:var(--paper);-webkit-font-smoothing:antialiased;line-height:1.5}
  .mono{font-family:"Spline Sans Mono",ui-monospace,monospace}
  .wrap{max-width:720px;margin:0 auto;padding:22px 18px 64px}

  header.booklet{padding-top:8px}
  .hdr-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .gyoshi{font-family:"Spline Sans Mono",monospace;font-size:12px;letter-spacing:.06em;
    border:1.5px solid var(--line-strong);border-radius:999px;padding:4px 11px;white-space:nowrap}
  .year{font-size:13px;color:var(--graphite)}
  .subject{font-weight:900;letter-spacing:.16em;font-size:clamp(38px,12vw,60px);margin:6px 0 2px;line-height:1}
  .rule{height:2px;background:var(--line-strong);margin:10px 0 8px}
  .meta{margin:0;font-family:"Spline Sans Mono",monospace;font-size:12px;color:var(--graphite);letter-spacing:.02em}

  .actions{margin:22px 0 10px;display:flex;gap:10px;flex-wrap:wrap}
  .btn-all{flex:1 1 auto;min-width:200px;cursor:pointer;background:var(--maroon);color:#fff;
    border:none;border-radius:12px;padding:15px 18px;font-family:"Noto Sans KR";font-weight:700;font-size:16px;
    display:flex;align-items:center;justify-content:center;gap:10px;
    box-shadow:0 2px 0 var(--maroon-d);transition:transform .12s ease,box-shadow .12s ease}
  .btn-all:hover{transform:translateY(-1px);box-shadow:0 4px 0 var(--maroon-d)}
  .btn-all:active{transform:translateY(1px);box-shadow:0 1px 0 var(--maroon-d)}
  .btn-all .cnt{font-family:"Spline Sans Mono";font-weight:600;font-size:13px;opacity:.85}

  .sheet{margin-top:14px;background:var(--sheet);border:1.5px solid var(--line-strong);border-radius:14px;overflow:hidden}
  .sheet-head{display:flex;justify-content:space-between;align-items:center;padding:11px 16px;
    background:var(--maroon);color:#fff;font-family:"Spline Sans Mono";font-size:12px;letter-spacing:.14em}
  ol.rows{list-style:none;margin:0;padding:6px}
  .row{display:grid;grid-template-columns:auto 54px 1fr auto;
    grid-template-areas:"num thumb info save";align-items:center;gap:14px;
    background:var(--card);border:1px solid var(--line);border-radius:10px;padding:11px 13px;margin:6px 2px;
    opacity:0;transform:translateY(8px);animation:rise .5s ease forwards}
  @keyframes rise{to{opacity:1;transform:none}}
  .num{grid-area:num;font-family:"Spline Sans Mono";font-weight:600;font-size:13px;color:#fff;
    background:var(--line-strong);border-radius:6px;width:34px;height:34px;
    display:flex;align-items:center;justify-content:center}
  .thumb{grid-area:thumb;display:block;border:1px solid var(--line);border-radius:4px;overflow:hidden;
    background:#fff;aspect-ratio:210/297}
  .thumb img{width:100%;height:100%;object-fit:cover;object-position:top;display:block}
  .info{grid-area:info}
  .label{font-weight:700;font-size:16px}
  .save{grid-area:save;cursor:pointer;white-space:nowrap;background:#fff;color:var(--maroon);
    border:1.5px solid var(--maroon);border-radius:9px;padding:10px 17px;
    font-family:"Noto Sans KR";font-weight:700;font-size:14px;transition:background .12s ease,color .12s ease}
  .save:hover{background:var(--maroon);color:#fff}
  .row.done{border-color:var(--maroon)}
  .row.done .save{background:var(--line-strong);border-color:var(--line-strong);color:#fff}
  .row.done .save::before{content:"✓ ";font-family:"Spline Sans Mono"}

  a{color:var(--maroon)}
  :focus-visible{outline:2px solid var(--maroon);outline-offset:2px}
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}.row{opacity:1;transform:none}}
</style>
</head>

<div class="wrap">
  <header class="booklet">
    <div class="hdr-row">
      <span class="gyoshi">제 2 교시</span>
      <span class="year">2027학년도 우정모의고사</span>
    </div>
    <h1 class="subject">수학 영역</h1>
    <div class="rule"></div>
    <p class="meta">문제지 · 총 8쪽 · 학생 공동 제작</p>
  </header>

  <div class="actions">
    <button class="btn-all" id="dlAll">전체 저장 <span class="cnt">ZIP · 8쪽</span></button>
  </div>

  <section class="sheet" aria-label="쪽별 다운로드">

    <ol class="rows" id="rows"></ol>
  </section>
</div>

const rows = document.getElementById('rows');
PAGES.forEach((p,i)=>{
  const li=document.createElement('li');
  li.className='row'; li.style.animationDelay=(i*0.05)+'s';
  li.innerHTML=`
    <span class="num mono">${String(p.n).padStart(2,'0')}</span>
    <a class="thumb" href="${p.uri}" target="_blank" rel="noopener" title="크게 보기">
      <img src="${p.uri}" alt="${p.n}쪽 미리보기" loading="lazy"></a>
    <div class="info"><span class="label">${p.n}쪽</span></div>
    <button class="save" data-i="${i}">저장</button>`;
  rows.appendChild(li);
});

function dataURItoBlob(uri){
  const [head,b64]=uri.split(','); const mime=head.match(/data:([^;]+)/)[1];
  const bin=atob(b64); const arr=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);
  return {blob:new Blob([arr],{type:mime}),bytes:arr};
}
function download(blob,name){
  const u=URL.createObjectURL(blob);const a=document.createElement('a');
  a.href=u;a.download=name;document.body.appendChild(a);a.click();a.remove();
  setTimeout(()=>URL.revokeObjectURL(u),2000);
}
rows.addEventListener('click',e=>{
  const btn=e.target.closest('.save'); if(!btn)return;
  const p=PAGES[+btn.dataset.i];
  download(dataURItoBlob(p.uri).blob,p.file);
  btn.closest('.row').classList.add('done');
});

function crc32(u8){let c=~0;for(let i=0;i<u8.length;i++){c^=u8[i];
  for(let k=0;k<8;k++)c=(c>>>1)^(0xEDB88320&-(c&1));}return (~c)>>>0;}
function makeZip(files){
  const enc=new TextEncoder();const chunks=[];const central=[];let offset=0;
  const push=(u8)=>{chunks.push(u8);offset+=u8.length;};
  const u16=n=>new Uint8Array([n&255,(n>>8)&255]);
  const u32=n=>new Uint8Array([n&255,(n>>8)&255,(n>>16)&255,(n>>>24)&255]);
  files.forEach(f=>{
    const name=enc.encode(f.name);const crc=crc32(f.data),size=f.data.length;const local=offset;const flag=0x0800;
    push(u32(0x04034b50));push(u16(20));push(u16(flag));push(u16(0));push(u16(0));push(u16(0));
    push(u32(crc));push(u32(size));push(u32(size));push(u16(name.length));push(u16(0));push(name);push(f.data);
    const c=[];const cp=(u8)=>c.push(u8);
    cp(u32(0x02014b50));cp(u16(20));cp(u16(20));cp(u16(flag));cp(u16(0));cp(u16(0));cp(u16(0));
    cp(u32(crc));cp(u32(size));cp(u32(size));cp(u16(name.length));cp(u16(0));cp(u16(0));cp(u16(0));cp(u16(0));cp(u32(0));cp(u32(local));cp(name);
    central.push(c);
  });
  const cdStart=offset;central.forEach(c=>c.forEach(push));const cdSize=offset-cdStart;
  push(u32(0x06054b50));push(u16(0));push(u16(0));push(u16(files.length));push(u16(files.length));
  push(u32(cdSize));push(u32(cdStart));push(u16(0));
  let total=0;chunks.forEach(c=>total+=c.length);const out=new Uint8Array(total);let o=0;
  chunks.forEach(c=>{out.set(c,o);o+=c.length;});
  return new Blob([out],{type:'application/zip'});
}
document.getElementById('dlAll').addEventListener('click',()=>{
  const files=PAGES.map(p=>({name:'우정모의고사/'+p.file,data:dataURItoBlob(p.uri).bytes}));
  download(makeZip(files),'우정모의고사_전체.zip');
  document.querySelectorAll('.row').forEach(r=>r.classList.add('done'));
});
