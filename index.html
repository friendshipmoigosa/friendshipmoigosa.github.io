<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2027학년도 우정모의고사 다운로드</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --background-color: #f8fafc;
            --card-background: #ffffff;
            --text-color: #1e293b;
        }

        body {
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            text-align: center;
            padding: 2.5rem;
            background: var(--card-background);
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            max-width: 480px;
            width: 90%;
        }

        .icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            line-height: 1.4;
        }

        p {
            font-size: 0.95rem;
            color: #64748b;
            margin-bottom: 2rem;
        }

        .btn {
            display: inline-block;
            width: 100%;
            padding: 1rem 0;
            background-color: var(--primary-color);
            color: white;
            text-decoration: none;
            font-weight: 600;
            border-radius: 8px;
            transition: background-color 0.2s ease, transform 0.1s ease;
            box-sizing: border-box;
        }

        .btn:hover {
            background-color: var(--primary-hover);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .footer {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: #94a3b8;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon">📝</div>
        <h1>2027학년도 우정모의고사</h1>
        <p>수학 영역 문제지 (PDF)</p>
        
        <!-- 실제 업로드할 PDF 파일명과 정확히 일치해야 합니다 -->
        <a href="TalkFile_TalkFile_우정모고.pdf.pdf" download class="btn">
            시험지 다운로드 (.pdf)
        </a>
        
        <div class="footer">
            © GitHub Pages 모의고사 저장소
        </div>
    </div>

</body>
</html>
